<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Твой любимый 💐 С 8 марта</title>
    <style>
        /* СБРОС И БАЗОВЫЕ НАСТРОЙКИ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            min-height: 100vh;
            background: #fad7f0; /* запасной цвет */
        }

        body {
            font-family: 'Dancing Script', 'Segoe UI', 'Helvetica Neue', cursive, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            
            /* Переливающийся фон специально для мобильных */
            background: radial-gradient(circle at 30% 40%, 
                #ffe4f0 0%, 
                #fad0e8 25%, 
                #f3c9ec 50%, 
                #e8c0e6 75%, 
                #d9b0e0 100%);
            background-size: 300% 300%;
            animation: mobileGradient 12s ease infinite;
            
            padding: 8px;
        }

        @keyframes mobileGradient {
            0% { background-position: 0% 0%; }
            25% { background-position: 100% 0%; }
            50% { background-position: 100% 100%; }
            75% { background-position: 0% 100%; }
            100% { background-position: 0% 0%; }
        }

        /* Мерцающие звездочки (адаптированы под ретину) */
        body::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 255, 255, 0.6) 1px, transparent 1px),
                radial-gradient(circle at 85% 45%, rgba(255, 200, 230, 0.7) 2px, transparent 2px),
                radial-gradient(circle at 23% 80%, rgba(255, 180, 210, 0.5) 1.5px, transparent 1.5px),
                radial-gradient(circle at 70% 15%, rgba(255, 220, 240, 0.8) 2px, transparent 2px),
                radial-gradient(circle at 92% 70%, rgba(255, 190, 225, 0.6) 1px, transparent 1px),
                radial-gradient(circle at 45% 33%, rgba(255, 210, 240, 0.7) 2px, transparent 2px);
            background-size: 200px 200px;
            opacity: 0.6;
            pointer-events: none;
            z-index: 1;
        }

        .wrapper {
            width: 100%;
            max-width: 450px; /* оптимально для смартфонов */
            position: relative;
            z-index: 10;
            margin: 0 auto;
        }

        /* Главная карточка — адаптивная, с красивыми краями */
        .pearl-card {
            background: rgba(255, 245, 252, 0.3);
            backdrop-filter: blur(18px) saturate(180%);
            -webkit-backdrop-filter: blur(18px) saturate(180%);
            border-radius: 60px 60px 60px 60px / 50px 50px 50px 50px;
            padding: 30px 18px;
            box-shadow: 
                0 25px 40px rgba(160, 90, 140, 0.3),
                0 0 0 3px rgba(255, 230, 245, 0.9) inset,
                0 0 50px rgba(255, 200, 240, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.9);
            transition: all 0.3s ease;
        }

        /* Шапка */
        .header {
            text-align: center;
            margin-bottom: 15px;
        }

        .greeting {
            font-size: 1.8rem;
            color: #a76397;
            text-shadow: 0 0 15px #fff0fa, 0 4px 10px #ffbfe5;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .beloved-name {
            font-size: 2.5rem;
            background: linear-gradient(145deg, #f29bc0, #c979b7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 800;
            filter: drop-shadow(0 5px 10px #ffa9d4);
            margin: 3px 0;
            line-height: 1.2;
            word-break: break-word;
        }

        .divider {
            height: 3px;
            background: linear-gradient(90deg, transparent, #ffb8df, #e09ac0, #ffb8df, transparent);
            width: 70%;
            margin: 12px auto;
            border-radius: 10px;
        }

        /* Индикатор шагов — компактный */
        .step-beads {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 15px 0 18px;
            flex-wrap: wrap;
            padding: 0 5px;
        }

        .bead {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: rgba(255, 220, 240, 0.7);
            border: 2px solid white;
            box-shadow: 0 0 10px #ffb0d0;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .bead.active {
            background: #ff8fc7;
            transform: scale(1.4);
            box-shadow: 0 0 18px #ff69b4;
            border-color: #fff0fb;
        }

        .bead.heart {
            background: #ffb3d9;
            border-radius: 50% 50% 0 50%;
            transform: rotate(45deg);
            width: 16px;
            height: 16px;
        }

        .bead.heart.active {
            transform: rotate(45deg) scale(1.3);
        }

        /* Контентная область */
        .content-area {
            min-height: 350px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 5px 0;
        }

        /* Стиль для вопросов */
        .question-block {
            width: 100%;
            text-align: center;
        }

        .question-text {
            font-size: 1.6rem;
            color: #823f73;
            margin-bottom: 22px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            padding: 18px 15px;
            backdrop-filter: blur(5px);
            box-shadow: 0 5px 15px rgba(255, 150, 200, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.8);
            line-height: 1.4;
            word-break: break-word;
        }

        .question-emoji {
            font-size: 2rem;
            margin-right: 10px;
            filter: drop-shadow(0 2px 8px hotpink);
        }

        /* Карточки-варианты */
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .option-card {
            background: rgba(255, 245, 250, 0.8);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255, 210, 235, 0.95);
            border-radius: 50px;
            padding: 16px 18px;
            font-size: 1.2rem;
            color: #643a60;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 6px 12px rgba(200, 120, 170, 0.2);
            font-weight: 500;
            border: 2px solid rgba(255, 255, 255, 0.9);
            min-height: 70px;
        }

        .option-card:active {
            background: #ffe6f5;
            border-color: #ff9fc7;
            transform: scale(0.98);
            box-shadow: 0 4px 8px rgba(200, 120, 170, 0.3);
        }

        .option-emoji {
            font-size: 2rem;
            min-width: 45px;
            text-align: center;
            filter: drop-shadow(0 2px 6px #ffa7d0);
        }

        .option-card span:last-child {
            flex: 1;
            text-align: left;
            font-size: 1.1rem;
            line-height: 1.3;
        }

        /* Стиль для карточек-признаний */
        .love-note-card {
            background: rgba(255, 230, 245, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 30px 20px;
            text-align: center;
            border: 3px solid white;
            box-shadow: 0 20px 35px rgba(200, 110, 160, 0.3);
            width: 100%;
            animation: softGlow 3s infinite alternate;
            margin: 5px 0;
        }

        @keyframes softGlow {
            0% { box-shadow: 0 15px 30px rgba(200, 110, 160, 0.2); }
            100% { box-shadow: 0 25px 45px rgba(230, 120, 180, 0.5); }
        }

        .love-emoji-large {
            font-size: 3.5rem;
            filter: drop-shadow(0 5px 12px #ffa0d0);
            margin: 8px 0;
        }

        .love-message {
            font-size: 1.9rem;
            color: #a53f82;
            margin: 15px 0;
            font-weight: 700;
            line-height: 1.4;
            word-break: break-word;
        }

        .love-description {
            font-size: 1.5rem;
            color: #ac68a0;
            font-style: italic;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 40px;
            padding: 18px;
            border: 2px dashed #f8b0d0;
            word-break: break-word;
        }

        /* Результат финальный */
        .final-result {
            width: 100%;
            text-align: center;
            padding: 5px 0;
        }

        .result-crown {
            font-size: 4.2rem;
            line-height: 1.2;
            animation: sparkleRotate 3s infinite;
        }

        @keyframes sparkleRotate {
            0% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(3deg) scale(1.08); }
            75% { transform: rotate(-3deg) scale(1.08); }
            100% { transform: rotate(0deg) scale(1); }
        }

        .result-title-big {
            font-size: 2.8rem;
            background: linear-gradient(135deg, #db70b0, #b23b8c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 800;
            margin: 12px 0;
            line-height: 1.2;
            word-break: break-word;
        }

        .result-story {
            font-size: 1.4rem;
            color: #783f6e;
            background: rgba(255, 220, 240, 0.7);
            padding: 20px;
            border-radius: 50px;
            border: 2px solid white;
            margin: 12px 0;
            line-height: 1.5;
            word-break: break-word;
        }

        /* Кнопки */
        .next-button, .reset-button {
            background: rgba(255, 230, 245, 0.95);
            border: 3px solid #ffb5d9;
            border-radius: 50px;
            padding: 16px 30px;
            font-size: 1.4rem;
            color: #b34d93;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
            margin: 20px 0 10px;
            font-weight: 700;
            box-shadow: 0 6px 0 #e89ec0;
            width: 100%;
            max-width: 280px;
            touch-action: manipulation;
        }

        .next-button:active, .reset-button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #e89ec0;
        }

        .signature-bottom {
            text-align: center;
            margin-top: 22px;
            font-size: 1.7rem;
            color: #a45287;
            text-shadow: 0 2px 12px white;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 60px;
            padding: 12px 15px;
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255, 255, 255, 0.9);
            word-break: break-word;
        }

        .signature-bottom span {
            font-size: 2rem;
            display: inline-block;
            animation: heartbeat 1.8s infinite;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            30% { transform: scale(1.1); }
            50% { transform: scale(1.15); }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* Маленькие экраны (до 380px) */
        @media (max-width: 380px) {
            .pearl-card {
                padding: 20px 12px;
                border-radius: 45px;
            }
            
            .question-text {
                font-size: 1.4rem;
                padding: 15px 12px;
            }
            
            .option-card {
                padding: 12px 15px;
                font-size: 1rem;
            }
            
            .option-emoji {
                font-size: 1.7rem;
                min-width: 40px;
            }
            
            .love-message {
                font-size: 1.6rem;
            }
            
            .love-description {
                font-size: 1.3rem;
            }
            
            .result-title-big {
                font-size: 2.2rem;
            }
            
            .result-story {
                font-size: 1.2rem;
            }
            
            .signature-bottom {
                font-size: 1.4rem;
            }
        }

        /* Очень маленькие */
        @media (max-width: 320px) {
            .greeting {
                font-size: 1.5rem;
            }
            
            .beloved-name {
                font-size: 2rem;
            }
            
            .step-beads {
                gap: 5px;
            }
            
            .bead {
                width: 12px;
                height: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="pearl-card">
            <!-- Верхняя часть с именем -->
            <div class="header">
                <div class="greeting">С 8 марта,</div>
                <div class="beloved-name">Моя Единственная</div>
                <div class="divider"></div>
            </div>

            <!-- Индикатор-бусинки -->
            <div class="step-beads" id="stepBeads"></div>

            <!-- Контент меняется здесь -->
            <div class="content-area" id="contentArea"></div>

            <!-- Подпись внизу -->
            <div class="signature-bottom">
                <span>💗</span> Твой любимый <span>💗</span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ========== 20 КАРТОЧЕК для мобильной версии ==========
            const cards = [
                // ВОПРОСЫ
                { type: 'question', emoji: '🌅', text: 'С каким ощущением ты проснулась?', 
                  options: [
                      { emoji: '🦋', text: 'Бабочки в животе' },
                      { emoji: '👑', text: 'Королевой бала' },
                      { emoji: '😏', text: 'С хитринкой' },
                      { emoji: '🌸', text: 'Нежно, как цветок' }
                  ]},
                
                { type: 'love', emoji: '💖', message: 'Ты самое прекрасное в моей жизни', 
                  desc: 'Твоя улыбка ярче тысячи цветов...' },
                
                { type: 'question', emoji: '🍭', text: 'Какое желание загадаешь?',
                  options: [
                      { emoji: '🎁', text: 'Море комплиментов' },
                      { emoji: '✨', text: 'Немного волшебства' },
                      { emoji: '🍫', text: 'Сладких моментов' },
                      { emoji: '🌟', text: 'Вечного праздника' }
                  ]},
                
                { type: 'love', emoji: '🌷', message: 'Ты — моё вдохновение', 
                  desc: 'Каждый день с тобой — подарок...' },
                
                { type: 'question', emoji: '🎀', text: 'Какая ты сегодня?',
                  options: [
                      { emoji: '😇', text: 'Нежная киска' },
                      { emoji: '🦊', text: 'Игривая лисичка' },
                      { emoji: '🐈⬛', text: 'Загадочная кошечка' },
                      { emoji: '🐇', text: 'Пушистый зайчик' }
                  ]},
                
                { type: 'love', emoji: '💕', message: 'Твои глаза сводят с ума', 
                  desc: 'В них хочется тонуть вечность' },
                
                { type: 'question', emoji: '🍬', text: 'Чего хочешь прямо сейчас?',
                  options: [
                      { emoji: '🤗', text: 'Крепких объятий' },
                      { emoji: '🎶', text: 'Танцевать' },
                      { emoji: '🍰', text: 'Что-то вкусное' },
                      { emoji: '💭', text: 'Помечтать о нас' }
                  ]},
                
                { type: 'love', emoji: '✨', message: 'Ты делаешь мир лучше', 
                  desc: 'Просто тем, что существуешь...' },
                
                { type: 'question', emoji: '🌸', text: 'Твоё настроение пахнет...',
                  options: [
                      { emoji: '🌹', text: 'Розами' },
                      { emoji: '🍊', text: 'Цитрусами' },
                      { emoji: '🍦', text: 'Ванилью' },
                      { emoji: '☕', text: 'Кофе' }
                  ]},
                
                { type: 'love', emoji: '💗', message: 'Я люблю тебя', 
                  desc: 'Сильнее, чем вчера...' },
                
                { type: 'question', emoji: '🎭', text: 'Кем бы ты была?',
                  options: [
                      { emoji: '👸', text: 'Принцессой' },
                      { emoji: '🧚', text: 'Доброй феей' },
                      { emoji: '🎬', text: 'Загадочной актрисой' },
                      { emoji: '📖', text: 'Героиней романа' }
                  ]},
                
                { type: 'love', emoji: '🌺', message: 'Ты — моё счастье', 
                  desc: 'Простое, огромное, бесконечное...' },
                
                { type: 'question', emoji: '🍇', text: 'Какой ты фрукт?',
                  options: [
                      { emoji: '🍓', text: 'Клубничка' },
                      { emoji: '🍒', text: 'Вишенка' },
                      { emoji: '🍑', text: 'Персик' },
                      { emoji: '🍊', text: 'Апельсин' }
                  ]},
                
                { type: 'love', emoji: '💐', message: 'Ты — лучший подарок', 
                  desc: 'Спасибо за каждый миг' },
                
                { type: 'question', emoji: '🪞', text: 'Что видишь в зеркале?',
                  options: [
                      { emoji: '👼', text: 'Ангела' },
                      { emoji: '😼', text: 'Хитрую красотку' },
                      { emoji: '🌸', text: 'Нежность' },
                      { emoji: '✨', text: 'Звезду' }
                  ]},
                
                { type: 'love', emoji: '🎵', message: 'Ты — мелодия сердца', 
                  desc: 'Звучишь во мне всегда' },
                
                { type: 'question', emoji: '☁️', text: 'Где ты витаешь?',
                  options: [
                      { emoji: '🌊', text: 'На море' },
                      { emoji: '🏰', text: 'В замке' },
                      { emoji: '🌌', text: 'Среди звёзд' },
                      { emoji: '🌳', text: 'В цветущем саду' }
                  ]},
                
                { type: 'love', emoji: '👑', message: 'Ты — королева', 
                  desc: 'Моего сердца навсегда' },
                
                { type: 'question', emoji: '💫', text: 'Финальный выбор: кто ты?',
                  options: [
                      { emoji: '👸', text: 'Нежная Принцесса', final: 0 },
                      { emoji: '🧚‍♀️', text: 'Озорная Фея', final: 1 },
                      { emoji: '🐈⬛', text: 'Таинственная Кошечка', final: 2 },
                      { emoji: '☀️', text: 'Солнечный Лучик', final: 3 }
                  ]}
            ];

            // Финальные образы (4 штуки)
            const finalImages = [
                { title: 'Нежная Принцесса', desc: 'Сегодня ты воздушная и трогательная, как первый весенний цветок. Хочется носить тебя на руках!', emoji: '👑🌸' },
                { title: 'Озорная Фея', desc: 'Искристая, весёлая, чуточку хулиганка — с тобой мир играет яркими красками!', emoji: '🧚‍♀️✨' },
                { title: 'Таинственная Кошечка', desc: 'Загадка с кошачьей грацией. Нежная, но с коготками. Тянет к тебе безумно!', emoji: '🐱💕' },
                { title: 'Солнечный Лучик', desc: 'Тёплая, живая, игривая. С тобой хочется смеяться и ловить весеннее солнце!', emoji: '☀️🌼' }
            ];

            // Состояние
            let currentCardIndex = 0;
            let finalResultIndex = 0;

            const beadsDiv = document.getElementById('stepBeads');
            const contentDiv = document.getElementById('contentArea');

            // Отрисовка бусинок
            function renderBeads(activeIndex) {
                let beadsHtml = '';
                for (let i = 0; i < cards.length; i++) {
                    let beadClass = 'bead';
                    if (cards[i].type === 'love') {
                        beadClass += ' heart';
                    }
                    if (i === activeIndex) {
                        beadClass += ' active';
                    }
                    beadsHtml += `<div class="${beadClass}"></div>`;
                }
                beadsDiv.innerHTML = beadsHtml;
            }

            // Отображение текущей карточки
            function renderCard(index) {
                const card = cards[index];
                
                if (card.type === 'question') {
                    renderQuestionCard(card, index);
                } else {
                    renderLoveCard(card, index);
                }
                
                renderBeads(index);
            }

            // Отрисовка вопроса
            function renderQuestionCard(card, idx) {
                let html = `
                    <div class="question-block">
                        <div class="question-text">
                            <span class="question-emoji">${card.emoji}</span> ${card.text}
                        </div>
                        <div class="options-container">
                `;
                
                card.options.forEach((opt, optIdx) => {
                    html += `
                        <div class="option-card" data-opt-index="${optIdx}" data-final="${opt.final !== undefined ? opt.final : ''}">
                            <span class="option-emoji">${opt.emoji}</span>
                            <span>${opt.text}</span>
                        </div>
                    `;
                });
                
                html += `</div></div>`;
                contentDiv.innerHTML = html;

                // Обработчики
                document.querySelectorAll('.option-card').forEach(opt => {
                    opt.addEventListener('click', function(e) {
                        const final = this.dataset.final;
                        
                        if (final !== '') {
                            finalResultIndex = parseInt(final);
                            showFinalResult(finalResultIndex);
                        } else {
                            if (currentCardIndex < cards.length - 1) {
                                currentCardIndex++;
                                renderCard(currentCardIndex);
                            } else {
                                showFinalResult(0);
                            }
                        }
                    });
                });
            }

            // Отрисовка признания
            function renderLoveCard(card, idx) {
                const html = `
                    <div class="love-note-card">
                        <div class="love-emoji-large">${card.emoji}</div>
                        <div class="love-message">${card.message}</div>
                        <div class="love-description">💬 ${card.desc}</div>
                        <div style="margin-top: 20px;">
                            <button class="next-button" id="nextAfterLove">💕 Дальше 💕</button>
                        </div>
                    </div>
                `;
                contentDiv.innerHTML = html;

                document.getElementById('nextAfterLove').addEventListener('click', function() {
                    if (currentCardIndex < cards.length - 1) {
                        currentCardIndex++;
                        renderCard(currentCardIndex);
                    } else {
                        showFinalResult(0);
                    }
                });
            }

            // Финальный экран
            function showFinalResult(resIdx) {
                const res = finalImages[resIdx];
                
                const finalHtml = `
                    <div class="final-result">
                        <div class="result-crown">${res.emoji}</div>
                        <div class="result-title-big">${res.title}</div>
                        <div class="result-story">${res.desc}</div>
                        <div style="font-size: 2.5rem; margin: 10px 0;">🌷💖🌷</div>
                        <button class="reset-button" id="fullResetBtn">💫 Пройти заново 💫</button>
                    </div>
                `;
                contentDiv.innerHTML = finalHtml;
                
                beadsDiv.innerHTML = '';

                document.getElementById('fullResetBtn').addEventListener('click', resetAll);
            }

            // Сброс
            function resetAll() {
                currentCardIndex = 0;
                finalResultIndex = 0;
                renderCard(0);
            }

            // Запуск
            resetAll();
        })();
    </script>
</body>
</html>
